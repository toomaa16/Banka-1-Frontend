<div>
  <div>
    <!-- Back + header -->
    <button type="button" (click)="onCancel()"
            class="inline-flex items-center gap-1.5 text-sm text-muted-foreground hover:text-primary transition-colors mb-4">
      <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline>
      </svg>
      Nazad na listu
    </button>

    <h1 class="text-2xl font-bold text-foreground mb-6">Detalji klijenta: {{ clientForm.get('ime')?.value }}</h1>

    <div class="z-card p-6">
      <!-- PR_31 T11: shared StateComponent zameni inline loading/error markup. -->
      <app-state *ngIf="isLoading" mode="loading" text="Učitavanje klijenta..."></app-state>
      <app-state *ngIf="errorMessage && !isLoading" mode="error" [text]="errorMessage"></app-state>

      <form *ngIf="!isLoading" [formGroup]="clientForm" (ngSubmit)="onSubmit()">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="z-label">Ime</label>
            <input type="text" formControlName="ime" class="z-input" />
          </div>
          <div>
            <label class="z-label">Prezime</label>
            <input type="text" formControlName="prezime" class="z-input" />
          </div>
          <div>
            <label class="z-label">Email</label>
            <input type="email" formControlName="email" class="z-input" [class.border-red-500]="clientForm.get('email')?.invalid && clientForm.get('email')?.touched" />
            <p *ngIf="clientForm.get('email')?.hasError('email') && clientForm.get('email')?.touched" class="text-xs text-red-500 mt-1">Validan email je obavezan.</p>
            <p *ngIf="clientForm.get('email')?.hasError('invalidEmailFormat') && clientForm.get('email')?.touched" class="text-xs text-red-500 mt-1">Email mora biti validnog formata (npr. banka@primer.rs).</p>
            <p *ngIf="backendEmailError" class="text-xs text-red-500 mt-1">{{ backendEmailError }}</p>
          </div>
          <div>
            <label class="z-label">Broj telefona</label>
            <input type="text" formControlName="brojTelefona" class="z-input" [class.border-red-500]="clientForm.get('brojTelefona')?.invalid && clientForm.get('brojTelefona')?.touched" />
            <p *ngIf="clientForm.get('brojTelefona')?.hasError('invalidPhoneFormat') && clientForm.get('brojTelefona')?.touched" class="text-xs text-red-500 mt-1">Broj telefona može sadržavati samo cifre i opciono + na početku.</p>
          </div>
          <div class="md:col-span-2">
            <label class="z-label">Adresa</label>
            <input type="text" formControlName="adresa" class="z-input" />
          </div>
        </div>

        <div class="flex justify-end gap-3 mt-6">
          <button type="button" class="z-btn-outline" (click)="onCancel()">Otkaži</button>
          <button type="submit" class="z-btn-primary" [disabled]="clientForm.invalid">Sačuvaj izmene</button>
        </div>
      </form>
    </div>
  </div>
</div>
