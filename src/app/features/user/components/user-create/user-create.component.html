<div>
  <div class="max-w-2xl">
    <div class="z-card p-8">
      <div class="mb-6">
        <h2 class="text-xl font-bold">Novi klijent</h2>
        <p class="text-sm text-muted-foreground mt-1">Unesite osnovne podatke za kreiranje novog klijenta.</p>
      </div>

      <form #userForm="ngForm" (ngSubmit)="submit(userForm)" class="space-y-4">
        <div class="max-w-lg mx-auto space-y-4">
          <div>
          <label class="z-label" for="firstName">Ime</label>
          <input
            id="firstName"
            class="z-input"
            [(ngModel)]="firstName"
            name="firstName"
            required
            placeholder="Unesite ime"
          />
          <p class="z-error" *ngIf="userForm.submitted && !firstName">
            Ime je obavezno.
          </p>
        </div>

        <div>
          <label class="z-label" for="lastName">Prezime</label>
          <input
            id="lastName"
            class="z-input"
            [(ngModel)]="lastName"
            name="lastName"
            required
            placeholder="Unesite prezime"
          />
          <p class="z-error" *ngIf="userForm.submitted && !lastName">
            Prezime je obavezno.
          </p>
        </div>

        <div>
          <label class="z-label" for="dateOfBirth">Datum rođenja</label>
          <input
            id="dateOfBirth"
            type="date"
            class="z-input"
            [(ngModel)]="dateOfBirth"
            name="dateOfBirth"
            required
          />
          <p class="z-error" *ngIf="userForm.submitted && validationErrors['dateOfBirth']">
            {{ validationErrors['dateOfBirth'] }}
          </p>
        </div>

        <div>
          <label class="z-label" for="gender">Pol</label>
          <select
            id="gender"
            class="z-select"
            [(ngModel)]="gender"
            name="gender"
            required
          >
            <option value="" disabled>Izaberite pol</option>
            <option value="M">Muški</option>
            <option value="F">Ženski</option>
          </select>
          <p class="z-error" *ngIf="userForm.submitted && !gender">
            Pol je obavezan.
          </p>
        </div>

        <div>
          <label class="z-label" for="email">Email</label>
          <input
            id="email"
            type="email"
            class="z-input"
            [(ngModel)]="email"
            name="email"
            required
            placeholder="Unesite email (npr. banka@primer.rs)"
          />
          <p class="z-error" *ngIf="userForm.submitted && validationErrors['email']">
            {{ validationErrors['email'] }}
          </p>
        </div>

        <div>
          <label class="z-label" for="phone">Broj telefona</label>
          <input
            id="phone"
            type="tel"
            class="z-input"
            [(ngModel)]="phone"
            name="phone"
            placeholder="+381 (60) 123 4567"
          />
          <p class="z-error" *ngIf="userForm.submitted && validationErrors['phone']">
            {{ validationErrors['phone'] }}
          </p>
        </div>

        <div>
          <label class="z-label" for="address">Adresa</label>
          <input
            id="address"
            class="z-input"
            [(ngModel)]="address"
            name="address"
            placeholder="Unesite adresu"
          />
        </div>

        <div>
          <label class="z-label" for="jmbg">JMBG</label>
          <input
            id="jmbg"
            class="z-input"
            [(ngModel)]="jmbg"
            name="jmbg"
            required
            minlength="13"
            maxlength="13"
            placeholder="Unesite JMBG (13 cifara)"
          />
          <p class="z-error" *ngIf="userForm.submitted && !jmbg">
            JMBG je obavezan.
          </p>
          <p class="z-error" *ngIf="userForm.submitted && jmbg && jmbg.length !== 13">
            JMBG mora imati tačno 13 cifara.
          </p>
        </div>

        <div class="pt-2">
          <button type="submit" class="z-btn z-btn-primary z-btn-full" [disabled]="submitting || !isFormValid()">
            {{ submitting ? 'Kreiranje...' : 'Kreiraj' }}
          </button>
        </div>
        </div>
      </form>
    </div>
  </div>
</div>
